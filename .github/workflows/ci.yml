name: Travele-platform CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_and_build:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
    # 1. 複製 GitHub 上的程式碼到虛擬機中 (正確官方名稱)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 設定 Node.js 環境 (正確官方名稱)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # 3. 安裝專案依賴套件
    - name: Install Dependencies
      run: npm ci

    # 4. 驗證 Prisma Schema 語法是否正確 (不依賴真實資料庫連線)
    - name: Validate Prisma Schema
      run: npx prisma validate

    # 5. 執行 TypeScript 與 React 語法檢查 (Lint)
    - name: Run Linter
      run: npm run lint

    # 6. 在雲端將 Next.js 16 網站打包一次，確保編譯無亂碼、無破壞性錯誤
    - name: Build Next.js Application
      run: npm run build
      env:
        DATABASE_URL: "postgresql://mock_user:mock_pwd@localhost:5432/mock_db?schema=public"