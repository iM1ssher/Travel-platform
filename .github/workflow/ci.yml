name: Travel-platform CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/workers/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 

      - name: Install dependencies
        run: npm ci 

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Run Linter (Code Style Check)
        run: npm run lint

      - name: Build Next.js Application
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ci_db?schema=public"
          NEXT_PUBLIC_TEMPORARY_CI: "true"